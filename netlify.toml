# ─────────────────────────────────────────────
# Netlify configuratie — Kapsalon Het Kniphuys
# ─────────────────────────────────────────────

[build]
  publish = "."
  # Geen buildstap nodig — pure statische site

# Netlify Forms verwerkt automatisch alle formulieren
# met het attribuut data-netlify="true"

# ── Caching headers ──────────────────────────
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/style.css"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/*.jpeg"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

# ── Formulier notificaties ────────────────────
# Stel in via Netlify dashboard → Forms → Notifications
# Ontvanger: post@kniphuys.nl
