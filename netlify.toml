# ─────────────────────────────────────────────
# Netlify configuratie — Kapsalon Het Kniphuys
# Eleventy build
# ─────────────────────────────────────────────

[build]
  command = "npm run build"
  publish = "_site"

[build.environment]
  NODE_VERSION = "18"

# Netlify Forms verwerkt automatisch alle formulieren
# met het attribuut data-netlify="true"

# ── Caching headers ──────────────────────────
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/images/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/assets/css/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/assets/js/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# ── Formulier notificaties ────────────────────
# Stel in via Netlify dashboard → Forms → Notifications
# Ontvanger: post@kniphuys.nl
